name: deploy
on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/workflows/*"
      - .gitignore
      - .pre-commit-config.yaml
      - iac/*
      - README.md
      - renovate.js
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Deploy
        run: nix develop --command make deploy
