name: build
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .github/workflows/*
      - .gitignore
      - .pre-commit-config.yaml
      - iac/*
      - README.md
      - renovate.js
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: nix develop --command make build
